<svg xmlns="http://www.w3.org/2000/svg" width="260" height="200" viewBox="0 0 260 200">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .pixel { 
      font-family: "Courier New", monospace; 
      font-size: 18px; 
      font-weight: bold; 
      white-space: pre;
    }
    .top   { fill: #FFD08A; }
    .body  { fill: #FF8C00; }
    .core  { fill: #FF6A00; }
    .eyes  { fill: #B34700; }
  </style>

  <text x="55" y="40" class="pixel" filter="url(#glow)">
    <tspan x="55" dy="0"  class="top">  ██████████  </tspan>
    <tspan x="55" dy="19" class="top">  ██████████  </tspan>

    <tspan x="55" dy="19" class="body">  █ ██████ █  </tspan>
    <tspan x="55" dy="19" class="core">██████████████</tspan>

    <tspan x="55" dy="19" class="body">██████  ██████</tspan>
    <tspan x="55" dy="19" class="body">  ██████████  </tspan>

    <tspan x="55" dy="19" class="top">  ██████████  </tspan>

    <!-- eyes -->
    <tspan x="55" dy="19" class="eyes">    ██  ██    </tspan>
    <tspan x="55" dy="19" class="eyes">    ██  ██    </tspan>

    <!-- extra gap between eyes and mouth -->
    <tspan x="55" dy="19"></tspan>

    <!-- mouth -->
    <tspan x="55" dy="19" class="eyes">     ████     </tspan>
  </text>
</svg>
